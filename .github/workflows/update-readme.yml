name: 🔄 Update README

on:
  schedule:
    - cron: "0 */6 * * *"   # Every 6 hours
  push:
    branches: [main]
  workflow_dispatch:         # Manual trigger anytime

jobs:
  update-readme:
    name: Sync Repos → README
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run README updater
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/update_readme.py

      - name: Commit & Push if changed
        run: |
          git config user.name "RNSL Bot"
          git config user.email "bot@rnsl.dev"
          git add README.md
          git diff --staged --quiet || git commit -m "chore: sync repos [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
